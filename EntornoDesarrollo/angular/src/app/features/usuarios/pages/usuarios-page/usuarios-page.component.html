<app-topbar pageTitle="Usuarios" />

<div class="page-content">

    <!-- Cabecera -->
    <div class="page-header">
      <div>
        <div class="page-title">Usuarios</div>
        <div class="page-subtitle">Gestiona los usuarios de la aplicación</div>
      </div>
      <button class="btn btn-primary" (click)="openAdd()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nuevo Usuario
      </button>
    </div>

    <!-- Estadísticas -->
    <app-usuarios-stats-row />

    <!-- Toolbar: búsqueda + filtros -->
    <app-usuarios-toolbar
      (searchChange)="onSearch($event)"
      (filterChange)="onFilterChange($event)"
    />

    <!-- Tabla -->
    <app-usuarios-table
      [usuarios]="svc.usuarios()"
      [currentPage]="currentPage"
      [pageSize]="PAGE_SIZE"
      [totalFiltered]="svc.total()"
      (detailClick)="onDetailClick($event)"
      (editClick)="onEditClick($event)"
      (bajaClick)="onBajaClick($event)"
      (pageChange)="onPageChange($event)"
    />

</div>

<!-- Modales -->
@if (showForm) {
  <app-usuarios-modal-form
    [usuario]="selectedUsuario"
    [emailUsuarios]="emailUsuarios()"
    [roles]="svc.roles()"
    (save)="onSaveForm($event)"
    (close)="showForm = false; selectedId = null"
  />
}

@if (showBaja && selectedUsuario) {
  <app-confirmation-modal
    [name]="selectedUsuario ? selectedUsuario.nombre + ' ' + selectedUsuario.apellido1 : ''"
    [mode]="selectedUsuario.enabled ? ConfirmMode.DESACTIVAR : ConfirmMode.ACTIVAR"
    (confirm)="onConfirmBaja()"
    (closed)="showBaja = false; selectedId = null"
  />
}

@if (showDetail && selectedUsuario) {
  <app-usuarios-modal-detail
    [usuario]="selectedUsuario"
    [roles]="svc.roles()"
    (edit)="onEditClick($event); showDetail = false"
    (close)="showDetail = false; selectedId = null"
  />
}
