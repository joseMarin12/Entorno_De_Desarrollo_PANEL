<div class="modal-overlay open">
  <div class="modal confirm-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title">{{ modalTitle }}</div>
        <div class="modal-subtitle">{{ modalSubtitle }}</div>
      </div>
      <button class="modal-close" (click)="close.emit()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="confirm-icon" [class.warning]="isDarBaja" [class.success]="!isDarBaja">
        @if (isDarBaja) {
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        } @else {
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        }
      </div>

      <h3 class="confirm-title">{{ confirmTitle }}</h3>
      <p class="confirm-desc" [innerHTML]="confirmDesc"></p>

      <div class="info-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <div [innerHTML]="infoText"></div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" (click)="close.emit()">Cancelar</button>
      <button
        class="btn"
        [class.btn-danger]="isDarBaja"
        [class.btn-success]="!isDarBaja"
        (click)="confirm.emit()">
        {{ isDarBaja ? 'Desactivar' : 'Activar' }}
      </button>
    </div>
  </div>
</div>
