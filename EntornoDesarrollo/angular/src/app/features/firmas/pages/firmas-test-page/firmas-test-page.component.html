<div class="h-screen bg-[#f8f9fe] flex flex-col font-sans">
  <app-topbar></app-topbar>

  <div class="flex-1 overflow-auto p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
      
      <!-- Encabezado de la página de prueba -->
      <header class="mb-8">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#5a4d9a] to-[#3198bf] flex items-center justify-center text-white shadow-md">
            <i class="feather icon-pen-tool text-xl"></i>
          </div>
          <h1 class="text-3xl font-black tracking-tight text-gray-900">Módulo de Firmas (Prueba)</h1>
        </div>
        <p class="text-gray-500 max-w-2xl text-lg">
          Esta es una vista temporal aislada para que construyas y pruebes los componentes de firma 
          antes de integrarlos en la vista de Trabajadores real.
        </p>
      </header>

      <!-- Aquí inyectamos tu componente de tabla -->
      <app-firmas-table [trabajadorId]="trabajadorIdDummy"></app-firmas-table>

    </div>
  </div>
</div>
