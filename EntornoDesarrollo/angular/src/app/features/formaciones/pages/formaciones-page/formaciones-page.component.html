<app-topbar pageTitle="Formaciones" />

<div class="page-content">

    <!-- Cabecera -->
    <div class="page-header">
      <div>
        <div class="page-title">Formaciones</div>
        <div class="page-subtitle">Gestiona las formaciones de Sg Tech</div>
      </div>
      <button class="btn btn-primary" (click)="openAdd()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nueva Formación
      </button>
    </div>

    <!-- Estadísticas -->
    <app-stats-row />

    <!-- Toolbar: búsqueda + filtros -->
    <app-toolbar
      (searchChange)="onSearchChange($event)"
      (filterChange)="onFilterChange($event)"
    />

    <!-- Tabla -->
    <app-formaciones-table
      [formaciones]="paginatedformaciones"
      [currentPage]="currentPage"
      [pageSize]="PAGE_SIZE"
      [totalFiltered]="filtered.length"
      (editClick)="onEditClick($event)"
      (bajaClick)="onBajaClick($event)"
      (pageChange)="currentPage = $event"
    />

</div>
<!-- Modales -->
@if (showAdd) {
  <app-modal-add
    (save)="onSaveAdd($event)"
    (close)="showAdd = false"
  />
}

@if (showEdit && selectedformacion) {
  <app-modal-edit
    [formacion]="selectedformacion"
    (save)="onSaveEdit($event)"
    (close)="showEdit = false; selectedId = null"
  />
}

@if (showBaja && selectedformacion) {
  <app-modal-baja
    [formacion]="selectedformacion"
    (confirm)="onConfirmBaja()"
    (close)="showBaja = false; selectedId = null"
  />
}
