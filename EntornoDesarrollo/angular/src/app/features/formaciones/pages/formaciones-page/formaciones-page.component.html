<app-topbar pageTitle="Formaciones" />

<div class="page-content">

  <!-- Cabecera -->
  <div class="page-header">
    <div>
      <div class="page-title">Formaciones</div>
      <div class="page-subtitle">Gestiona las formaciones de Sg Tech</div>
    </div>
    <button class="btn btn-primary" (click)="openAdd()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      Nueva Formación
    </button>
  </div>

  <!-- Estadísticas -->
  <app-stats-row [total]="svc.total()" [activas]="svc.totalActivos()" [inactivas]="svc.totalInactivos()" />

  <!-- Toolbar: búsqueda + filtros -->
  <app-toolbar (searchChange)="onSearchChange($event)" (filterChange)="onFilterChange($event)" />

  <!-- Tabla -->
  <app-formaciones-table [formaciones]="paginatedformaciones()" [currentPage]="currentPage()" [pageSize]="PAGE_SIZE"
    [totalFiltered]="filtered().length" (editClick)="onEditClick($event)" (bajaClick)="onBajaClick($event)"
    (participantesClick)="onParticipantesClick($event)" (pageChange)="currentPage.set($event)" />

</div>

<!-- Modales -->
@if (showForm) {
<app-modal-formacion [formacion]="selectedformacion()!" (save)="onSaveForm($event)"
  (close)="showForm = false; selectedId.set(null)" />
}

@if (showBaja && selectedformacion()) {
<app-confirmation-modal [name]="selectedformacion()!.curso"
  [title]="selectedformacion()!.activo ? '¿Dar de baja formación?' : '¿Reactivar formación?'"
  [description]="selectedformacion()!.activo ? 'La formación pasará a estado inactivo.' : 'La formación volverá a estar disponible.'"
  [mode]="selectedformacion()!.activo ? ConfirmMode.DESACTIVAR : ConfirmMode.ACTIVAR" (confirm)="onConfirmBaja()"
  (closed)="showBaja = false; selectedId.set(null)" />
}

@if (showParticipantes && selectedformacion()) {
<app-modal-participantes [formacion]="selectedformacion()!" (close)="showParticipantes = false; selectedId.set(null)" />
}
