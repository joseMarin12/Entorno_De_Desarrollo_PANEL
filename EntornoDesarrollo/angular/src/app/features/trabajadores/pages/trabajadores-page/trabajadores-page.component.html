<app-topbar pageTitle="Trabajadores" />

<div class="page-content">
  <div class="page-header">
    <div>
      <div class="page-title">Trabajadores</div>
      <div class="page-subtitle">Gestiona tu equipo de trabajadores en plantilla y freelances</div>
    </div>
    <button class="btn btn-primary" (click)="openAdd()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nuevo Trabajador
    </button>
  </div>

  <app-trab-stats-row 
    [total]="statsTotal()"
    [activos]="statsActivos()"
    [inactivos]="statsInactivos()"
    [freelances]="statsFreelances()"
  />

  <div style="margin-bottom:16px">
    <app-trab-toolbar
      (searchChange)="onSearchChange($event)"
      (filterChange)="onFilterChange($event)"
      (tipoFilterChange)="onTypeFilterChange($event)"
      (importCsvClick)="showImportModal = true"
    />
  </div>

  <app-table
    [columns]="tableColumns"
    [rows]="trabajadores()"
    [currentPage]="currentPage()"
    [pageSize]="PAGE_SIZE"
    [totalFiltered]="totalFiltered()"
    [entityLabel]="'trabajadores'"
    (actionClick)="onTableAction($event)"
    (pageChange)="onPageChange($event)"
  />
</div>

@if (showForm) {
  <app-trab-modal-form
    [trabajador]="selectedTrabajador"
    [existingEmails]="existingEmails()"
    [existingDnis]="existingDnis()"
    [tiposDoc]="tiposDoc()"
    (save)="onSaveForm($event)"
    (close)="closeModals()"
  />
}

@if (showDetail && selectedTrabajador) {
  <app-trab-modal-detail
    [trabajador]="selectedTrabajador"
    [asignaciones]="detailAsignaciones()"
    [formaciones]="detailFormaciones()"
    [tiposDoc]="tiposDoc()"
    [docs]="detailDocs()"
    [previewBase64]="previewBase64()"
    (downloadDoc)="onDownloadDoc($event)"
    (deleteDoc)="onDeleteDoc($event)"
    (uploadNewDoc)="onUploadNewDoc($event)"
    (updateDoc)="onUpdateDoc($event)"
    (requestPreviewArchivo)="onPreviewArchivo($event)"
    (openFirma)="onOpenFirma($event)"
    (edit)="onEditClick($event); showDetail = false"
    (close)="closeModals()"
  />
}

@if (showFirma && selectedTrabajador) {
  <app-trab-modal-firma
    [trabajador]="selectedTrabajador"
    [firma]="selectedFirma()"
    [previewBase64]="firmaPreviewBase64()"
    [enviando]="firmaEnviando()"
    (requestPreviewArchivo)="onPreviewArchivoFirma($event)"
    (save)="onSaveFirma($event)"
    (cancelar)="onCancelarFirma($event)"
    (eliminarDoc)="onEliminarDocDesdeFirma($event)"
    (close)="onCloseFirma()"
  />
}

@if (showConfirm) {
  <app-confirmation-modal
    [mode]="confirmMode"
    [name]="selectedTrabajadorNombre() || 'Trabajador'"
    [title]="confirmCustomTitle() || '¿Seguro que quiere realizar esta acción?'"
    [description]="confirmCustomDesc()"
    (confirm)="onConfirmToggle()"
    (closed)="showConfirm = false" />
}

<app-import-csv-modal 
  [isOpen]="showImportModal" 
  endpointUrl="http://localhost:8000/api/trabajadores/importar-csv"
  (close)="showImportModal = false"
  (importSuccess)="onCsvImportado($event)">
</app-import-csv-modal>
