<div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon purple">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M17 20h5v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2h5"/><circle cx="12" cy="8" r="4"/>
          </svg>
        </div>
        <div>
          <div class="stat-num">{{ total() }}</div>
          <div class="stat-label">Total direcciones</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon blue">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div>
          <div class="stat-num">{{ activos() }}</div>
          <div class="stat-label">Activas</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon teal">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
        </div>
        <div>
          <div class="stat-num">{{ inactivos() }}</div>
          <div class="stat-label">Dadas de baja</div>
        </div>
      </div>
</div>
