<div class="toolbar" style="display: flex; align-items: center; width: 100%; gap: 10px;">
  <div class="search-wrap" style="flex:1; max-width:360px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" type="text" placeholder="Buscar por nombre…" [(ngModel)]="searchValue" (ngModelChange)="searchChange.emit($event)" />
  </div>

  <select class="form-select" style="max-width: 180px; padding: 9px 12px; margin: 0 16px;" [(ngModel)]="filterValue" (ngModelChange)="filterChange.emit($event)">
    <option value="">Estado: Todas</option>
    <option value="activa">Activa</option>
    <option value="baja">Inactiva</option>
  </select>

  <select class="form-select" style="max-width: 180px; padding: 9px 12px; margin: 0 16px 0 0;" [(ngModel)]="tipoFilterValue" (ngModelChange)="tipoFilterChange.emit($event)">
    <option value="">Tipo: Todos</option>
    @for (tipo of tipos(); track tipo.id) {
      <option [value]="tipo.nombre">{{ tipo.nombre }}</option>
    }
  </select>
  
  <!-- BOTÓN CARGA MASIVA CSV (Alineado a la derecha) -->
  <button class="btn btn-primary" style="background-color: #476fab; border: none; margin-left: auto; display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 0.5rem 1rem; border-radius: 6px; color: white; font-size: 14px; font-weight: 500;" (click)="emitImportClick()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Carga masiva CSV
  </button>
</div>
