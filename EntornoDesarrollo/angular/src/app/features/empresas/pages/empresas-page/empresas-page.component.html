<app-topbar pageTitle="Empresas" />

<div class="page-content">

  <div class="page-header">
    <div>
      <div class="page-title">Empresas</div>
      <div class="page-subtitle">Gestiona las empresas de Sg Tech</div>
    </div>
    <button class="btn btn-primary" (click)="openAdd()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      Nueva Empresa
    </button>
  </div>

  <app-stats-row [total]="statsTotal()" [activos]="statsActivos()" [inactivos]="statsInactivos()" />

  <app-toolbar
    (searchChange)="onSearchChange($event)"
    (filterChange)="onFilterChange($event)"
    (tipoFilterChange)="onTypeFilterChange($event)"
    (dataChanged)="onCsvImported()"
  />

  <app-table
    [columns]="tableColumns"
    [rows]="empresas()"
    [currentPage]="currentPage()"
    [pageSize]="PAGE_SIZE"
    [totalFiltered]="total()"
    [entityLabel]="'empresas'"
    (actionClick)="onTableAction($event)"
    (pageChange)="onPageChange($event)"
    (rowDblClick)="onDetailClick($event)"
  />

</div>

@if (showAdd) {
  <app-modal-empresas (saveAdd)="onSaveAdd($any($event))" (close)="showAdd = false" />
}

@if (showDetail && selectedEmpresa) {
  <app-empresas-modal-detail [empresa]="selectedEmpresa" (close)="showDetail = false; selectedId = null" />
}

@if (showEdit && selectedEmpresa) {
  <app-modal-empresas [empresa]="selectedEmpresa" [existingCIFs]="existingCIFsForEdit" (saveEdit)="onSaveEdit($any($event))" (close)="showEdit = false; selectedId = null" />
}

@if (showDirecciones && relacionesEmpresa) {
  <app-empresa-direcciones-modal
    [idEmpresa]="relacionesEmpresaId!"
    [nombreEmpresa]="fullName(relacionesEmpresa)"
    (close)="showDirecciones = false; relacionesEmpresaId = null; onRelacionesClosed()"
  />
}

@if (showContactos && relacionesEmpresa) {
  <app-empresa-contactos-modal
    [idEmpresa]="relacionesEmpresaId!"
    [nombreEmpresa]="fullName(relacionesEmpresa)"
    (close)="showContactos = false; relacionesEmpresaId = null; onRelacionesClosed()"
  />
}

@if (showBaja && selectedEmpresa) {
  <app-confirmation-modal 
    [name]="fullName(selectedEmpresa)"
    [mode]="selectedEmpresa.activo ? ConfirmMode.DESACTIVAR : ConfirmMode.ACTIVAR" 
    (confirm)="onConfirmBaja()"
    (closed)="showBaja = false; selectedId = null" 
  />
}
