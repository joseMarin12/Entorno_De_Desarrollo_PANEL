<div class="modal-overlay open">
  <div class="modal modal-sm" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title">{{ modalTitle }}</div>
        <div class="modal-subtitle">{{ modalSubtitle }}</div>
      </div>
      <button class="modal-close" (click)="close.emit()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <!-- Icono dinámico -->
      @if (isDarBaja) {
        <div class="confirm-icon warning">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
      } @else {
        <div class="confirm-icon success">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </div>
      }

      <div class="confirm-title">{{ confirmTitle }}</div>
      <div class="confirm-desc" [innerHTML]="confirmDesc"></div>

      <div class="info-box">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div class="info-box-text" [innerHTML]="infoText"></div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" (click)="close.emit()">Cancelar</button>

      @if (isDarBaja) {
        <button class="btn btn-danger-outline" (click)="confirm.emit()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          Confirmar Baja
        </button>
      } @else {
        <button class="btn btn-success-outline" (click)="confirm.emit()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Confirmar Reactivación
        </button>
      }
    </div>
  </div>
</div>
