<div class="login-container">
  <div class="login-left">
    <div class="left-content">
      <div class="blue-line"></div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-form-container">
      <div class="logo">
        <img src="assets/SgTech_PNG-tzC31Gukxu_5YGlCjQuZcw.png" alt="sg tech logo">
      </div>
      
      <h1>BIENVENIDO!</h1>
      <p class="subtitle">INICIA SESIÓN CON TU USUARIO</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Correo Electrónico Corporativo</label>
          <div class="input-wrapper" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" id="email" formControlName="email" placeholder="usuario@sgtech.tech">
          </div>
          @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
            <small class="error-text">Introduce un email válido</small>
          }
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper" [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" formControlName="password" placeholder="••••••••">
          </div>
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <small class="error-text">La contraseña es obligatoria</small>
          }
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Cargando...' : 'Iniciar Sesión' }}
          @if (!loading) {
            <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          }
        </button>
      </form>
    </div>
  </div>
</div>
