<div class="change-password-container">
  <div class="card">
    <h2>Cambio de Contraseña Obligatorio</h2>
    <p>Por seguridad, debes cambiar tu contraseña la primera vez que accedes.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="newPassword">Nueva Contraseña</label>
        <input type="password" id="newPassword" formControlName="newPassword" class="form-control" placeholder="Mínimo 8 caracteres">
        <div *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.errors?.['required']" class="error">
          La contraseña es obligatoria
        </div>
        <div *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.errors?.['minlength']" class="error">
          Mínimo 8 caracteres
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control">
        <div *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.errors?.['required']" class="error">
          Debes confirmar la contraseña
        </div>
        <div *ngIf="form.get('confirmPassword')?.touched && form.errors?.['mismatch']" class="error">
          Las contraseñas no coinciden
        </div>
      </div>

      <button type="submit" [disabled]="form.invalid || loading" class="btn btn-primary">
        {{ loading ? 'Actualizando...' : 'Cambiar Contraseña' }}
      </button>
    </form>
  </div>
</div>
