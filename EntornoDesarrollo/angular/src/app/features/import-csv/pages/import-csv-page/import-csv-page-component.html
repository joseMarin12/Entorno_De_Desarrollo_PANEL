@if (isOpen) {
  <div class="modal-backdrop" (click)="cerrarModal()">
    
    <div class="modal-content" (click)="$event.stopPropagation()">
      
      <div class="modal-header">
        <h3>Importar Archivo CSV</h3>
        <button class="close-x" (click)="cerrarModal()">&times;</button>
      </div>

      @if (mensajeServidor) {
        <div class="server-message" [class.error]="mensajeServidor.includes('❌')">
          {{ mensajeServidor }}
        </div>
      }
      
      <div class="upload-container-modal">
        @if (!selectedFile) {
          <div 
            class="upload-box" 
            [class.drag-over]="isDragging"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)">
            
            <div class="upload-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#476fab" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>

            <h4>Arrastra tu archivo CSV aquí</h4>
            <p>o haz clic para buscarlo</p>
            
            <button class="btn btn-primary btn-sm" [disabled]="cargando" (click)="fileInput.click()">
              Buscar archivo
            </button>
            
            <input type="file" #fileInput (change)="onFileSelected($event)" accept=".csv" hidden>
          </div>
        } @else {
          <div class="upload-box file-ready">
            <div class="upload-icon success-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
            </div>

            <h4>{{ cargando ? 'Procesando...' : '¡Archivo cargado!' }}</h4>
            
            <div class="file-details">
              <p class="truncate"><strong>Archivo:</strong> {{ selectedFile.name }}</p>
            </div>

            <div class="action-buttons">
              <button class="btn btn-success" [disabled]="cargando" (click)="guardarArchivo()">
                {{ cargando ? 'Subiendo...' : 'Confirmar' }}
              </button>
              <button class="btn btn-secondary" [disabled]="cargando" (click)="cerrarModal()">
                Cancelar
              </button>
            </div>
          </div>
        }
      </div>

    </div>
  </div>
}
