<!-- Overlay oscuro para móvil — cierra el sidebar al tocar fuera -->
<div class="sidebar-overlay" [class.visible]="ui.sidebarOpen()" (click)="ui.closeSidebar()"></div>

<aside class="sidebar" [class.open]="ui.sidebarOpen()">
  <div class="sidebar-logo">
    <div class="logo-text">S<span>g</span> Tech</div>
    <div class="logo-sub">Panel de Administración</div>
    <!-- Botón cerrar — solo visible en móvil -->
    <button class="sidebar-close-btn" (click)="ui.closeSidebar()" aria-label="Cerrar menú">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Gestión Interna</div>

    <a class="nav-item" routerLink="/usuarios" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
      </svg>
      Usuarios
    </a>

    <a class="nav-item" routerLink="/seleccionadores" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
      </svg>
      Seleccionadores
    </a>

    <a class="nav-item" routerLink="/comerciales" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M17 20h5v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2h5" />
        <circle cx="12" cy="8" r="4" />
      </svg>
      Comerciales
    </a>

    <a class="nav-item" routerLink="/empresas" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <rect x="2" y="7" width="20" height="14" rx="2" />
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
      </svg>
      Empresas
    </a>

    <a class="nav-item" routerLink="/formaciones" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path
          d="M3 8l7.89 5.26a2 2 0 0 0 2.22 0L21 8M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z" />
      </svg>
      Formaciones
    </a>

    <div class="nav-section-label">Trabajadores</div>

    <a class="nav-item" routerLink="/trabajadores" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
      </svg>
      Trabajadores
    </a>

    <a class="nav-item" routerLink="/headhunting" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg>
      HeadHunting
    </a>

    <a class="nav-item" routerLink="/asignaciones" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M9 17H7A5 5 0 0 1 7 7h2M15 7h2a5 5 0 0 1 0 10h-2M8 12h8" />
      </svg>
      Asignaciones
    </a>

    <a class="nav-item" routerLink="/facturaciones" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
      </svg>
      Facturaciones
    </a>

    <a class="nav-item" routerLink="/comisiones" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
      Comisiones
    </a>

    <a class="nav-item" routerLink="/informes" routerLinkActive="active" (click)="ui.closeSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="3" y1="9" x2="21" y2="9" />
        <line x1="9" y1="21" x2="9" y2="9" />
      </svg>
      Informes
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">AM</div>
      <div>
        <div class="user-name">Admin</div>
        <div class="user-role">Administrador</div>
      </div>
    </div>
  </div>
</aside>
